<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concrete OMS | Login</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container" style="max-width:520px; margin-top:60px;">
    <div class="card">
      <h1>Concrete OMS</h1>
      <p class="small">Sign in to manage orders, production, deliveries, and payments.</p>
      <form id="loginForm">
        <label>Email</label>
        <input type="email" id="email" placeholder="admin@concrete.local" required />
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
        <button type="submit">Login</button>
      </form>
      <p class="small">No account yet? <a href="/register.html">Register as customer</a></p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email: email.value, password: password.value })
        });
        setAuth(data);
        window.location.href = '/dashboard.html';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>

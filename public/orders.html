<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/orders.html">Orders</a>
    <a href="/create-order.html">Create Order</a>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h1>Orders</h1>
    <table>
      <thead><tr><th>ID</th><th>Grade</th><th>Volume</th><th>Status</th><th>Total</th><th>Action</th></tr></thead>
      <tbody id="ordersBody"></tbody>
    </table>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  mustLogin();
  const user = getUser();

  async function loadOrders() {
    try {
      const endpoint = user.roles.includes('CUSTOMER') ? '/orders/my' : '/orders/all';
      const orders = await apiFetch(endpoint);
      ordersBody.innerHTML = orders.map(o => `
        <tr>
          <td>${o.id}</td><td>${o.grade_code || ''}</td><td>${o.volume_m3}</td>
          <td><span class="tag">${o.status}</span></td><td>${o.total_amount}</td>
          <td>
            ${user.roles.includes('CUSTOMER') && o.status === 'NEW' ? `<button onclick="cancelOrder(${o.id})">Cancel</button>` : ''}
          </td>
        </tr>
      `).join('');
    } catch (error) {
      alert(error.message);
    }
  }

  async function cancelOrder(id) {
    try {
      await apiFetch(`/orders/my/${id}/cancel`, { method: 'PATCH' });
      await loadOrders();
    } catch (error) {
      alert(error.message);
    }
  }

  loadOrders();
</script>
</body>
</html>

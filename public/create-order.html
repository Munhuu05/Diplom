<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concrete OMS | Create Order</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="container">
  <div class="header">
    <div class="brand">Create Order</div>
    <div class="nav">
      <a href="/dashboard.html">Dashboard</a>
      <a href="/orders.html">Orders</a>
      <a href="/create-order.html">Create Order</a>
      <button class="secondary" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="card">
    <h2>New Concrete Order</h2>
    <p class="small">Fill in delivery details. Manager will confirm after payment/approval.</p>
    <form id="orderForm">
      <label>Concrete Grade</label>
      <select id="concrete_grade_id" required></select>

      <label>Volume (m3)</label>
      <input id="volume_m3" type="number" step="0.1" min="0.5" placeholder="10" required />

      <label>Delivery Date & Time</label>
      <input id="delivery_datetime" type="datetime-local" required />

      <label>Delivery Address</label>
      <textarea id="delivery_address" placeholder="Street, city, location note" required></textarea>

      <label class="inline"><input id="pump_required" type="checkbox" style="width:auto;" /> Pump required</label>
      <button type="submit">Submit Order</button>
    </form>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  mustLogin();

  async function loadGrades() {
    try {
      const grades = await apiFetch('/meta/grades');
      concrete_grade_id.innerHTML = grades.map(g => `<option value="${g.id}">${g.grade_code} - ${g.description || ''}</option>`).join('');
    } catch (error) {
      concrete_grade_id.innerHTML = '<option value="">Failed to load grades</option>';
      alert(error.message);
    }
  }

  orderForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await apiFetch('/orders', {
        method: 'POST',
        body: JSON.stringify({
          concrete_grade_id: Number(concrete_grade_id.value),
          volume_m3: Number(volume_m3.value),
          delivery_datetime: new Date(delivery_datetime.value).toISOString(),
          delivery_address: delivery_address.value,
          pump_required: pump_required.checked
        })
      });
      alert('Order created successfully');
      window.location.href = '/orders.html';
    } catch (error) {
      alert(error.message);
    }
  });

  loadGrades();
</script>
</body>
</html>

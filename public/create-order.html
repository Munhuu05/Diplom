<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Order</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/orders.html">Orders</a>
    <a href="/create-order.html">Create Order</a>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h1>Create Order</h1>
    <form id="orderForm">
      <input id="concrete_grade_id" type="number" placeholder="Concrete grade ID (e.g. 1 for M200)" required />
      <input id="volume_m3" type="number" step="0.1" placeholder="Volume m3" required />
      <input id="delivery_datetime" type="datetime-local" required />
      <textarea id="delivery_address" placeholder="Delivery address" required></textarea>
      <label><input id="pump_required" type="checkbox" /> Pump required</label>
      <button type="submit">Submit Order</button>
    </form>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  mustLogin();
  document.getElementById('orderForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    try {
      await apiFetch('/orders', {
        method: 'POST',
        body: JSON.stringify({
          concrete_grade_id: Number(concrete_grade_id.value),
          volume_m3: Number(volume_m3.value),
          delivery_datetime: new Date(delivery_datetime.value).toISOString(),
          delivery_address: delivery_address.value,
          pump_required: pump_required.checked
        })
      });
      alert('Order created');
      window.location.href = '/orders.html';
    } catch (error) {
      alert(error.message);
    }
  });
</script>
</body>
</html>

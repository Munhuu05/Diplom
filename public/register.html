<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Concrete OMS | Register</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div class="container" style="max-width:580px; margin-top:50px;">
    <div class="card">
      <h1>Customer Registration</h1>
      <p class="small">Create a customer account to place concrete orders online.</p>
      <form id="registerForm">
        <label>Full name</label>
        <input id="full_name" placeholder="John Doe" required />
        <label>Email</label>
        <input id="email" type="email" placeholder="customer@email.com" required />
        <label>Phone</label>
        <input id="phone" placeholder="+1 555 123 4567" />
        <label>Password</label>
        <input id="password" type="password" placeholder="Minimum 6 characters" minlength="6" required />
        <button type="submit">Create account</button>
      </form>
      <p class="small">Already registered? <a href="/login.html">Back to login</a></p>
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script>
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      try {
        await apiFetch('/auth/register', {
          method: 'POST',
          body: JSON.stringify({
            full_name: full_name.value,
            email: email.value,
            phone: phone.value,
            password: password.value
          })
        });
        alert('Registration successful. Please login now.');
        window.location.href = '/login.html';
      } catch (error) {
        alert(error.message);
      }
    });
  </script>
</body>
</html>

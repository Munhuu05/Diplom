<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<div class="container">
  <div class="nav">
    <a href="/dashboard.html">Dashboard</a>
    <a href="/orders.html">Orders</a>
    <a href="/create-order.html">Create Order</a>
    <a href="/admin.html">Admin</a>
    <button class="secondary" onclick="logout()">Logout</button>
  </div>

  <div class="card">
    <h1>Dashboard</h1>
    <p id="welcome"></p>
    <div id="reportArea"></div>
  </div>
</div>
<script src="/js/app.js"></script>
<script>
  mustLogin();
  const user = getUser();
  document.getElementById('welcome').innerText = `Welcome ${user.full_name} (${user.roles.join(', ')})`;

  async function loadReport() {
    if (!user.roles.some(r => ['ADMIN','MANAGER','ACCOUNTANT'].includes(r))) return;
    try {
      const report = await apiFetch('/reports/dashboard');
      document.getElementById('reportArea').innerHTML = `
        <div class="grid">
          <div class="card"><h3>Total Orders</h3><p>${report.summary.total_orders}</p></div>
          <div class="card"><h3>Revenue</h3><p>$${report.summary.revenue}</p></div>
        </div>
        <h3>Orders by Status</h3>
        <ul>${report.byStatus.map(s => `<li>${s.status}: ${s.count}</li>`).join('')}</ul>
      `;
    } catch (e) {
      document.getElementById('reportArea').innerText = e.message;
    }
  }
  loadReport();
</script>
</body>
</html>
